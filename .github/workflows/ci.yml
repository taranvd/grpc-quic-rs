name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install protoc
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y protobuf-compiler
          elif [ "$RUNNER_OS" == "macOS" ]; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install protobuf
          fi
          protoc --version

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy (all targets, all features, deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo check
        run: cargo check --workspace --all-targets

      - name: Tests
        run: cargo test --workspace

  # Separate job for benchmarks — compile-only check (no run, avoids long CI times)
  bench-check:
    name: Benchmark compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
      - name: Check benchmarks compile
        run: cargo check --workspace --benches

      - name: Check loss-simulation bench compiles (Linux-only, requires features)
        run: cargo check -p grpc-quic-benches --features loss-sim --benches

      - name: Configure 5% packet loss on lo (idempotent)
        run: |
          sudo tc qdisc replace dev lo root netem loss 5%
          echo "--- qdisc status ---"
          tc qdisc show dev lo

      - name: Run loss bench (quick smoke-test under loss)
        run: cargo bench -p grpc-quic-benches --features loss-sim --bench loss_bench -- --quick

      - name: Remove packet loss on lo
        if: always()
        run: sudo tc qdisc del dev lo root 2>/dev/null || true
