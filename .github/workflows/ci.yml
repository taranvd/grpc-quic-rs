name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Nightly full performance run
    - cron: "0 6 * * 1-5"
  workflow_dispatch:
    inputs:
      bench_mode:
        description: "Benchmark mode"
        required: true
        default: "quick"
        type: choice
        options:
          - quick
          - regression
          - nightly

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install protoc
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y protobuf-compiler
          elif [ "$RUNNER_OS" == "macOS" ]; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install protobuf
          fi
          protoc --version

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy (all targets, all features, deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo check
        run: cargo check --workspace --all-targets

      - name: Tests
        run: cargo test --workspace

  # ── PR / push: quick benchmark sanity check ──────────────────────────────
  bench-quick:
    name: Bench (quick smoke)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2

      - name: Check all benchmarks compile
        run: cargo check -p grpc-quic-benches --benches

      - name: Quick bench (no loss, small samples)
        run: >
          cargo bench -p grpc-quic-benches
          --bench quic_latency --bench handshake
          -- --quick

  # ── On push/PR to main: regression bench (medium) ────────────────────────
  bench-regression:
    name: Bench (regression)
    if: >
      github.event_name == 'push' &&
      github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2

      - name: Run latency benchmarks
        run: cargo bench -p grpc-quic-benches --bench quic_latency --bench tcp_latency

      - name: Upload JSON reports
        uses: actions/upload-artifact@v4
        with:
          name: bench-reports
          path: target/bench-results/*.json

  # ── Nightly / manual: full performance CI ────────────────────────────────
  bench-nightly:
    name: Bench (nightly)
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       inputs.bench_mode == 'nightly')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2

      - name: Configure 5 % packet loss
        run: scripts/netem.sh on lo 5

      - name: Run all benchmarks with loss
        run: >
          cargo bench -p grpc-quic-benches
          --bench quic_latency --bench tcp_latency
          --bench loss_sim --bench handshake

      - name: Remove packet loss
        if: always()
        run: scripts/netem.sh off lo

      - name: Upload JSON reports
        uses: actions/upload-artifact@v4
        with:
          name: nightly-bench-reports
          path: target/bench-results/*.json

      - name: Generate summary table
        if: always()
        run: |
          echo "## Nightly Benchmark Results" >> $GITHUB_STEP_SUMMARY
          for f in target/bench-results/*.json; do
            echo "### $(basename $f .json)" >> $GITHUB_STEP_SUMMARY
            cat "$f" | python3 -m json.tool >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          done
